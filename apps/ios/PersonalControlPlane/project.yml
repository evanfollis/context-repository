name: PersonalControlPlane
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.contextrepo.personalcontrolplane
    SWIFT_VERSION: 5.10
targets:
  PersonalControlPlane:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Domain
      - path: Data
      - path: Features
      - path: Shared
    info:
      path: App/Info.plist
      properties:
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
